<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a"/>
    <meta name="robots" content="noindex, nofollow"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="المعرض"/>
    <link rel="manifest" href="/manifest.json">
    <title>معرض شرف الدين</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: auto; }
        @media print {
            body > * { display: none; }
            #receipt-print { display: block !important; position: fixed; inset: 0; background: white; z-index: 9999; padding: 32px; }
        }
        #receipt-print { display: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
<div id="root"></div>
<div id="receipt-print"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Storage shim ──────────────────────────────────────────────────────────
window._store = window._store || {};
window.storage = {
    get:(k,sh)=>{ try{ const v=localStorage.getItem((sh?'sh_':'pr_')+k); return Promise.resolve(v?{value:v}:null); }catch(e){ return Promise.resolve(null); } },
    set:(k,v,sh)=>{ try{ localStorage.setItem((sh?'sh_':'pr_')+k,v); }catch(e){} return Promise.resolve({value:v}); },
    delete:(k,sh)=>{ try{ localStorage.removeItem((sh?'sh_':'pr_')+k); }catch(e){} return Promise.resolve({deleted:true}); }
};

// ── Helpers ───────────────────────────────────────────────────────────────
const genId = () => `${Date.now()}-${Math.random().toString(36).substr(2,9)}`;

// Feature 10: Egyptian Pound
const fmtCurrency = n => {
    const num = parseFloat(n)||0;
    return num.toLocaleString('ar-EG', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' ج.م';
};

const fmtDate = d => new Date(d).toLocaleDateString('ar-EG',{year:'numeric',month:'short',day:'numeric'});

// ── SVG Icons ─────────────────────────────────────────────────────────────
const Ic = ({d,vb='0 0 24 24',...p}) => <svg viewBox={vb} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d={d}/></svg>;
const IconPkg   = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>;
const IconEGP   = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><text x="2" y="18" fontSize="16" fontFamily="Arial" fill="currentColor" stroke="none">ج</text></svg>;
const IconUsers = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
const IconTrend = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;
const IconCard  = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>;
const IconAlert = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
const IconPlus  = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
const IconSearch= p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
const IconDl    = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
const IconUp    = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
const IconEdit  = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
const IconTrash = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
const IconSave  = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
const IconMove  = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="m21 8-4-4-4 4"/><path d="M17 4v16"/></svg>;
const IconCal   = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
const IconX     = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
const IconHist  = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.72"/></svg>;
const IconPrint = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
const IconBell  = p=><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>;

// ── Main App ──────────────────────────────────────────────────────────────
function App() {
    const [tab, setTab]             = useState('dashboard');
    const [loading, setLoading]     = useState(true);
    const [products, setProducts]   = useState([]);
    const [sales, setSales]         = useState([]);
    const [customers, setCustomers] = useState([]);
    const [installments, setInst]   = useState([]);
    const [movements, setMovements] = useState([]);
    const importRef = useRef();

    useEffect(() => {
        (async () => {
            try {
                const [p,s,c,i,m] = await Promise.all([
                    window.storage.get('products',true),
                    window.storage.get('sales',true),
                    window.storage.get('customers',true),
                    window.storage.get('installments',true),
                    window.storage.get('movements',true),
                ]);
                if(p?.value) setProducts(JSON.parse(p.value));
                if(s?.value) setSales(JSON.parse(s.value));
                if(c?.value) setCustomers(JSON.parse(c.value));
                if(i?.value) setInst(JSON.parse(i.value));
                if(m?.value) setMovements(JSON.parse(m.value));
            } catch(e){ console.error(e); }
            finally { setLoading(false); }
        })();
    }, []);

    useEffect(()=>{ if(!loading) window.storage.set('products',JSON.stringify(products),true); },[products,loading]);
    useEffect(()=>{ if(!loading) window.storage.set('sales',JSON.stringify(sales),true); },[sales,loading]);
    useEffect(()=>{ if(!loading) window.storage.set('customers',JSON.stringify(customers),true); },[customers,loading]);
    useEffect(()=>{ if(!loading) window.storage.set('installments',JSON.stringify(installments),true); },[installments,loading]);
    useEffect(()=>{ if(!loading) window.storage.set('movements',JSON.stringify(movements),true); },[movements,loading]);

    // Feature 3: Export
    const exportData = () => {
        const blob = new Blob([JSON.stringify({products,sales,customers,installments,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href=url; a.download=`gallery-export-${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    };

    // Feature 9: Import
    const handleImport = e => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const d = JSON.parse(ev.target.result);
                if(d.products)     setProducts(d.products);
                if(d.sales)        setSales(d.sales);
                if(d.customers)    setCustomers(d.customers);
                if(d.installments) setInst(d.installments);
                alert('✅ تم استيراد البيانات بنجاح');
            } catch { alert('❌ ملف غير صالح. يرجى استخدام ملف تصدير صالح.'); }
        };
        reader.readAsText(file);
        e.target.value='';
    };

    const deleteSale = saleId => {
        const sale = sales.find(s=>s.id===saleId);
        if(!sale || !confirm('هل تريد حذف هذه الفاتورة؟ سيتم استعادة المخزون.')) return;
        setProducts(prev=>prev.map(p=>{
            const item=(sale.items||[]).find(it=>it.productId===p.id);
            if(!item) return p;
            return {...p, quantityInStock:p.quantityInStock+item.quantity, quantityInDisplay:Math.min(p.quantityInDisplay+item.quantity, p.quantityInDisplay+item.quantity)};
        }));
        setSales(prev=>prev.filter(s=>s.id!==saleId));
    };

    if(loading) return (
        <div className="min-h-screen bg-slate-900 flex items-center justify-center">
            <div className="text-center"><div className="w-16 h-16 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div><p className="text-white text-lg">جارٍ التحميل...</p></div>
        </div>
    );

    const TABS = [
        {id:'dashboard',   label:'لوحة التحكم', Icon:IconTrend},
        {id:'products',    label:'المنتجات',    Icon:IconPkg},
        {id:'sales',       label:'المبيعات',    Icon:IconEGP},
        {id:'customers',   label:'العملاء',     Icon:IconUsers},
        {id:'installments',label:'الأقساط',     Icon:IconCard},
        {id:'reports',     label:'التقارير',    Icon:IconBell},
    ];

    return (
        <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
            {/* Header */}
            <header className="bg-slate-900/80 backdrop-blur border-b border-amber-500/20 sticky top-0 z-50">
                <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
                    <div className="flex items-center gap-3 min-w-0">
                        <div className="w-10 h-10 bg-gradient-to-br from-amber-400 to-amber-600 rounded-lg flex items-center justify-center shrink-0">
                            <IconPkg className="w-6 h-6 text-slate-900"/>
                        </div>
                        <div className="min-w-0">
                            <h1 className="text-base sm:text-lg font-bold text-white truncate">معرض شرف الدين</h1>
                            <p className="text-xs text-amber-400 hidden sm:block">نظام إدارة المخزون والمبيعات</p>
                        </div>
                    </div>
                    <div className="flex items-center gap-2 shrink-0">
                        <input ref={importRef} type="file" accept=".json" onChange={handleImport} className="hidden"/>
                        <button onClick={()=>importRef.current.click()}
                            className="px-3 py-2 bg-blue-500/10 text-blue-400 rounded-lg hover:bg-blue-500/20 text-sm border border-blue-500/20 flex items-center gap-1 transition-colors">
                            <IconUp className="w-4 h-4"/><span className="hidden sm:inline">استيراد</span>
                        </button>
                        <button onClick={exportData}
                            className="px-3 py-2 bg-amber-500/10 text-amber-400 rounded-lg hover:bg-amber-500/20 text-sm border border-amber-500/20 flex items-center gap-1 transition-colors">
                            <IconDl className="w-4 h-4"/><span className="hidden sm:inline">تصدير</span>
                        </button>
                    </div>
                </div>
            </header>

            {/* Nav */}
            <nav className="bg-slate-900/40 backdrop-blur border-b border-slate-700/50 overflow-x-auto scrollbar-hide">
                <div className="max-w-7xl mx-auto px-2 flex">
                    {TABS.map(({id,label,Icon})=>(
                        <button key={id} onClick={()=>setTab(id)}
                            className={`px-3 sm:px-5 py-3 font-medium transition-all flex items-center gap-1.5 whitespace-nowrap text-sm shrink-0 ${tab===id?'text-amber-400 border-b-2 border-amber-400 bg-amber-500/5':'text-slate-400 hover:text-white'}`}>
                            <Icon className="w-4 h-4"/><span className="hidden sm:inline">{label}</span><span className="sm:hidden text-xs">{label.slice(0,4)}</span>
                        </button>
                    ))}
                </div>
            </nav>

            <main className="max-w-7xl mx-auto px-3 sm:px-4 py-5">
                {tab==='dashboard'    && <Dashboard products={products} sales={sales} installments={installments} customers={customers}/>}
                {tab==='products'     && <ProductsTab products={products} setProducts={setProducts} movements={movements} setMovements={setMovements}/>}
                {tab==='sales'        && <SalesTab sales={sales} setSales={setSales} products={products} setProducts={setProducts} customers={customers} deleteSale={deleteSale}/>}
                {tab==='customers'    && <CustomersTab customers={customers} setCustomers={setCustomers} installments={installments} sales={sales} products={products}/>}
                {tab==='installments' && <InstallmentsTab installments={installments} setInstallments={setInst} customers={customers} sales={sales}/>}
                {tab==='reports'      && <ReportsTab sales={sales} products={products} installments={installments}/>}
            </main>
        </div>
    );
}

// ── Dashboard ─────────────────────────────────────────────────────────────
function Dashboard({products,sales,installments,customers}){
    const now=new Date();
    const ms=sales.filter(s=>{const d=new Date(s.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
    const rev=ms.reduce((a,s)=>a+s.total,0);
    const pft=ms.reduce((a,s)=>a+s.profit,0);
    const inv=products.reduce((a,p)=>a+(p.purchaseCost||0)*(p.quantityInStock||0),0);
    const pending=installments.filter(i=>i.status!=='مدفوع');
    const pendingTotal=pending.reduce((a,i)=>a+(i.remainingBalance||0),0);
    const lowStock=products.filter(p=>(p.quantityInStock||0)<=(p.minimumStockAlert||0)&&p.status==='نشط');

    const topProducts=[...products].map(p=>({
        ...p,
        sold:sales.flatMap(s=>s.items||[]).filter(it=>it.productId===p.id).reduce((a,it)=>a+(it.quantity||0),0)
    })).sort((a,b)=>b.sold-a.sold).slice(0,5);

    return (
        <div className="space-y-6">
            <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
                <StatCard title="إيرادات الشهر"   value={fmtCurrency(rev)}          Icon={IconTrend} color="emerald" sub={`${ms.length} فاتورة`}/>
                <StatCard title="أرباح الشهر"     value={fmtCurrency(pft)}          Icon={IconEGP}   color="blue"   sub={`${((pft/(rev||1))*100).toFixed(1)}% هامش`}/>
                <StatCard title="قيمة المخزون"    value={fmtCurrency(inv)}          Icon={IconPkg}   color="purple" sub={`${products.length} منتج`}/>
                <StatCard title="مستحقات الأقساط" value={fmtCurrency(pendingTotal)} Icon={IconCard}  color="amber"  sub={`${pending.length} قسط نشط`}/>
            </div>

            {lowStock.length>0&&(
                <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-4 flex gap-3">
                    <IconAlert className="w-5 h-5 text-red-400 shrink-0 mt-0.5"/>
                    <div>
                        <h3 className="text-red-400 font-semibold mb-2">⚠️ تنبيه: مخزون منخفض</h3>
                        <div className="space-y-1">{lowStock.map(p=>(
                            <div key={p.id} className="text-sm text-red-300">{p.name}: {p.quantityInStock} وحدة (الحد الأدنى: {p.minimumStockAlert})</div>
                        ))}</div>
                    </div>
                </div>
            )}

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-slate-800/50 rounded-xl p-5 border border-slate-700/50">
                    <h2 className="text-base font-semibold text-white mb-4 flex items-center gap-2"><IconTrend className="w-5 h-5 text-amber-400"/>الأكثر مبيعاً</h2>
                    <div className="space-y-2">
                        {topProducts.filter(p=>p.sold>0).map((p,i)=>(
                            <div key={p.id} className="flex items-center justify-between p-3 bg-slate-900/40 rounded-lg">
                                <div className="flex items-center gap-3">
                                    <div className="w-7 h-7 bg-amber-500/20 rounded flex items-center justify-center text-amber-400 text-xs font-bold">{i+1}</div>
                                    <div><div className="text-white text-sm font-medium">{p.name}</div><div className="text-xs text-slate-400">{p.category}</div></div>
                                </div>
                                <div className="text-right"><div className="text-white text-sm font-semibold">{p.sold} وحدة</div><div className="text-xs text-slate-400">مخزون: {p.quantityInStock}</div></div>
                            </div>
                        ))}
                        {topProducts.filter(p=>p.sold>0).length===0&&<p className="text-slate-400 text-sm text-center py-8">لا توجد مبيعات بعد</p>}
                    </div>
                </div>
                <div className="bg-slate-800/50 rounded-xl p-5 border border-slate-700/50">
                    <h2 className="text-base font-semibold text-white mb-4 flex items-center gap-2"><IconBell className="w-5 h-5 text-amber-400"/>أحدث الفواتير</h2>
                    <div className="space-y-2">
                        {[...sales].reverse().slice(0,5).map(s=>{
                            const cust=customers.find(c=>c.id===s.customerId);
                            return (
                                <div key={s.id} className="flex items-center justify-between p-3 bg-slate-900/40 rounded-lg">
                                    <div><div className="text-amber-400 text-sm font-medium">{s.invoiceNumber}</div><div className="text-xs text-slate-400">{cust?.fullName||'زبون عابر'} · {fmtDate(s.date)}</div></div>
                                    <div className="text-right"><div className="text-emerald-400 text-sm font-semibold">{fmtCurrency(s.total)}</div><div className="text-xs text-slate-400">{(s.items||[]).length} أصناف</div></div>
                                </div>
                            );
                        })}
                        {sales.length===0&&<p className="text-slate-400 text-sm text-center py-8">لا توجد فواتير بعد</p>}
                    </div>
                </div>
            </div>
        </div>
    );
}

function StatCard({title,value,Icon,color,sub}){
    const colors={
        emerald:'from-emerald-900/40 to-emerald-800/20 border-emerald-500/30 text-emerald-400',
        blue:'from-blue-900/40 to-blue-800/20 border-blue-500/30 text-blue-400',
        purple:'from-purple-900/40 to-purple-800/20 border-purple-500/30 text-purple-400',
        amber:'from-amber-900/40 to-amber-800/20 border-amber-500/30 text-amber-400',
    };
    return (
        <div className={`bg-gradient-to-br ${colors[color]} rounded-xl p-4 border`}>
            <div className="flex justify-between items-start mb-2">
                <span className="text-xs text-slate-300 font-medium leading-tight">{title}</span>
                <Icon className={`w-5 h-5 ${colors[color].split(' ').pop()} shrink-0`}/>
            </div>
            <div className="text-lg sm:text-xl font-bold text-white mb-1 leading-tight">{value}</div>
            <div className="text-xs text-slate-400">{sub}</div>
        </div>
    );
}

// ── Products Tab ──────────────────────────────────────────────────────────
function ProductsTab({products,setProducts,movements,setMovements}){
    const [showAdd,setShowAdd]=useState(false);
    const [editing,setEditing]=useState(null);
    const [search,setSearch]=useState('');
    const [catFilter,setCatFilter]=useState('all');
    const [moveModal,setMoveModal]=useState(null);

    const cats=[...new Set(products.map(p=>p.category).filter(Boolean))];
    const filtered=products.filter(p=>{
        const ms=p.name?.toLowerCase().includes(search.toLowerCase())||(p.barcode||'').includes(search);
        const mc=catFilter==='all'||p.category===catFilter;
        return ms&&mc;
    });

    const addProduct=d=>{
        const qty=(parseInt(d.quantityInDisplay)||0)+(parseInt(d.quantityInStorage)||0);
        setProducts([...products,{id:genId(),...d,quantityInDisplay:parseInt(d.quantityInDisplay)||0,quantityInStorage:parseInt(d.quantityInStorage)||0,quantityInStock:qty,purchaseCost:parseFloat(d.purchaseCost)||0,currentSellingPrice:parseFloat(d.currentSellingPrice)||0,createdAt:new Date().toISOString()}]);
        setShowAdd(false);
    };
    const updateProduct=(id,u)=>{
        const disp=parseInt(u.quantityInDisplay)||0, stor=parseInt(u.quantityInStorage)||0;
        setProducts(products.map(p=>p.id===id?{...p,...u,quantityInDisplay:disp,quantityInStorage:stor,quantityInStock:disp+stor,purchaseCost:parseFloat(u.purchaseCost)||0,currentSellingPrice:parseFloat(u.currentSellingPrice)||0}:p));
        setEditing(null);
    };
    const deleteProduct=id=>{if(confirm('حذف هذا المنتج؟'))setProducts(products.filter(p=>p.id!==id));};
    const moveStock=(productId,from,to,qty)=>{
        const p=products.find(x=>x.id===productId); if(!p) return;
        setMovements([...movements,{id:genId(),productId,from,to,quantity:qty,date:new Date().toISOString()}]);
        let d=p.quantityInDisplay, s=p.quantityInStorage;
        if(from==='display')d-=qty; else s-=qty;
        if(to==='display')d+=qty; else s+=qty;
        setProducts(products.map(x=>x.id===productId?{...x,quantityInDisplay:d,quantityInStorage:s,quantityInStock:d+s}:x));
        setMoveModal(null);
    };

    return (
        <div className="space-y-5">
            <div className="flex flex-col sm:flex-row gap-3 sm:items-center justify-between">
                <div><h2 className="text-xl font-bold text-white">المنتجات والمخزون</h2><p className="text-slate-400 text-sm mt-0.5">إدارة المنتجات والمستودع</p></div>
                <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-lg flex items-center gap-2 transition-colors self-start sm:self-auto">
                    <IconPlus className="w-4 h-4"/>إضافة منتج
                </button>
            </div>
            <div className="flex flex-col sm:flex-row gap-3">
                <div className="relative flex-1">
                    <IconSearch className="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"/>
                    <input type="text" placeholder="بحث..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full pr-9 pl-3 py-2 bg-slate-800/60 border border-slate-700/50 rounded-lg text-white placeholder-slate-500 text-sm focus:outline-none focus:border-amber-500/50"/>
                </div>
                <select value={catFilter} onChange={e=>setCatFilter(e.target.value)} className="px-3 py-2 bg-slate-800/60 border border-slate-700/50 rounded-lg text-white text-sm focus:outline-none focus:border-amber-500/50">
                    <option value="all">كل الفئات</option>
                    {cats.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
            </div>
            <div className="bg-slate-800/50 rounded-xl border border-slate-700/50 overflow-hidden">
                <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                        <thead className="bg-slate-900/60">
                            <tr>{['المنتج','الفئة','التكلفة','السعر','الوحدة','المخزون','العرض','المستودع','اللون','المواصفات','الحالة',''].map(h=>(
                                <th key={h} className="px-3 py-3 text-right text-xs font-semibold text-slate-400 whitespace-nowrap">{h}</th>
                            ))}</tr>
                        </thead>
                        <tbody className="divide-y divide-slate-700/30">
                            {filtered.map(p=>(
                                <tr key={p.id} className="hover:bg-slate-900/30 transition-colors">
                                    <td className="px-3 py-3"><div className="font-medium text-white">{p.name}</div>{p.barcode&&<div className="text-xs text-slate-500">{p.barcode}</div>}</td>
                                    <td className="px-3 py-3 text-slate-300 whitespace-nowrap">{p.category}</td>
                                    <td className="px-3 py-3 text-slate-300 whitespace-nowrap">{fmtCurrency(p.purchaseCost)}</td>
                                    <td className="px-3 py-3 text-emerald-400 font-semibold whitespace-nowrap">{fmtCurrency(p.currentSellingPrice)}</td>
                                    <td className="px-3 py-3 whitespace-nowrap"><span className="px-2 py-0.5 bg-blue-500/15 text-blue-300 rounded text-xs font-medium">{p.unitType||'قطعة'}</span></td>
                                    <td className="px-3 py-3 whitespace-nowrap"><span className={`font-bold ${(p.quantityInStock||0)<=(p.minimumStockAlert||0)?'text-red-400':'text-white'}`}>{p.quantityInStock||0}</span></td>
                                    <td className="px-3 py-3 text-slate-300">{p.quantityInDisplay||0}</td>
                                    <td className="px-3 py-3 text-slate-300">{p.quantityInStorage||0}</td>
                                    <td className="px-3 py-3 text-slate-300 text-xs whitespace-nowrap">{p.color||<span className="text-slate-600">—</span>}</td>
                                    <td className="px-3 py-3 text-slate-300 text-xs max-w-40 truncate" title={p.specs||''}>{p.specs||<span className="text-slate-600">—</span>}</td>
                                    <td className="px-3 py-3 whitespace-nowrap"><span className={`px-2 py-0.5 rounded-full text-xs ${p.status==='نشط'?'bg-emerald-500/20 text-emerald-400':'bg-slate-600/30 text-slate-400'}`}>{p.status}</span></td>
                                    <td className="px-3 py-3">
                                        <div className="flex gap-1">
                                            <button onClick={()=>setMoveModal(p)} className="p-1.5 hover:bg-blue-500/20 text-blue-400 rounded" title="نقل مخزون"><IconMove className="w-4 h-4"/></button>
                                            <button onClick={()=>setEditing(p)} className="p-1.5 hover:bg-amber-500/20 text-amber-400 rounded" title="تعديل"><IconEdit className="w-4 h-4"/></button>
                                            <button onClick={()=>deleteProduct(p.id)} className="p-1.5 hover:bg-red-500/20 text-red-400 rounded" title="حذف"><IconTrash className="w-4 h-4"/></button>
                                        </div>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                    {filtered.length===0&&<div className="text-center py-12 text-slate-400">لا توجد منتجات</div>}
                </div>
            </div>
            {(showAdd||editing)&&<ProductModal product={editing} onSave={editing?updateProduct:addProduct} onCancel={()=>{setShowAdd(false);setEditing(null);}}/>}
            {moveModal&&<MoveModal product={moveModal} onMove={moveStock} onClose={()=>setMoveModal(null)}/>}
        </div>
    );
}

function ProductModal({product,onSave,onCancel}){
    const [f,setF]=useState(product?{...product}:{name:'',barcode:'',category:'',supplier:'',purchaseCost:'',currentSellingPrice:'',quantityInDisplay:'',quantityInStorage:'',minimumStockAlert:5,status:'نشط',color:'',specs:'',unitType:'قطعة'});
    const submit=e=>{e.preventDefault();product?onSave(product.id,f):onSave(f);};
    const F=(label,key,type='text',extra={})=>(
        <div><label className="block text-xs font-medium text-slate-300 mb-1.5">{label}</label>
        <input type={type} value={f[key]??''} onChange={e=>setF({...f,[key]:e.target.value})} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:border-amber-500/50" {...extra}/></div>
    );
    return (
        <Modal title={product?'تعديل المنتج':'منتج جديد'} onClose={onCancel} wide>
            <form onSubmit={submit} className="space-y-4">
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    {F('اسم المنتج *','name','text',{required:true,placeholder:'اسم المنتج'})}
                    {F('باركود','barcode','text',{placeholder:'اختياري'})}
                    {F('الفئة *','category','text',{required:true,placeholder:'ثريات، إضاءة...'})}
                    {F('المورد','supplier','text',{placeholder:'اسم المورد'})}
                    {F('تكلفة الشراء (ج.م) *','purchaseCost','number',{required:true,step:'0.01',placeholder:'0.00'})}
                    {F('سعر البيع (ج.م) *','currentSellingPrice','number',{required:true,step:'0.01',placeholder:'0.00'})}
                    {F('كمية العرض','quantityInDisplay','number',{placeholder:'أدخل الكمية',min:'0'})}
                    {F('كمية المستودع','quantityInStorage','number',{placeholder:'أدخل الكمية',min:'0'})}
                    {F('حد التنبيه','minimumStockAlert','number',{min:'0'})}
                    <div><label className="block text-xs font-medium text-slate-300 mb-1.5">الحالة</label>
                    <select value={f.status} onChange={e=>setF({...f,status:e.target.value})} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm focus:outline-none focus:border-amber-500/50">
                        <option value="نشط">نشط</option><option value="متوقف">متوقف</option>
                    </select></div>
                    {/* Feature 3: Unit type */}
                    <div><label className="block text-xs font-medium text-slate-300 mb-1.5">وحدة البيع</label>
                    <select value={f.unitType||'قطعة'} onChange={e=>setF({...f,unitType:e.target.value})} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm focus:outline-none focus:border-amber-500/50">
                        <option value="قطعة">قطعة</option>
                        <option value="متر">متر</option>
                        <option value="لفة">لفة</option>
                        <option value="كرتونة">كرتونة</option>
                    </select></div>
                    {/* Feature 2: Color + Specs */}
                    {F('اللون','color','text',{placeholder:'مثال: ذهبي، أبيض، أسود...'})}
                    <div className="sm:col-span-2">{F('المواصفات','specs','text',{placeholder:'مثال: ارتفاع 90سم × قطر 70سم، 12 نقطة ضوء'})}</div>
                </div>
                <div className="flex gap-3 pt-3 border-t border-slate-700/50">
                    <button type="submit" className="flex-1 py-2.5 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-lg transition-colors flex items-center justify-center gap-2"><IconSave className="w-4 h-4"/>حفظ</button>
                    <button type="button" onClick={onCancel} className="px-5 py-2.5 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-colors">إلغاء</button>
                </div>
            </form>
        </Modal>
    );
}

function MoveModal({product,onMove,onClose}){
    const [from,setFrom]=useState('storage');
    const [to,setTo]=useState('display');
    const [qty,setQty]=useState(1);
    const max=from==='display'?(product.quantityInDisplay||0):(product.quantityInStorage||0);
    return (
        <Modal title="نقل المخزون" onClose={onClose}>
            <p className="text-slate-400 text-sm mb-4">{product.name}</p>
            <form onSubmit={e=>{e.preventDefault();if(from!==to&&qty>=1&&qty<=max)onMove(product.id,from,to,qty);}} className="space-y-4">
                <div><label className="block text-xs font-medium text-slate-300 mb-1.5">من</label>
                <select value={from} onChange={e=>setFrom(e.target.value)} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm focus:outline-none focus:border-amber-500/50">
                    <option value="display">العرض ({product.quantityInDisplay||0} وحدة)</option>
                    <option value="storage">المستودع ({product.quantityInStorage||0} وحدة)</option>
                </select></div>
                <div><label className="block text-xs font-medium text-slate-300 mb-1.5">إلى</label>
                <select value={to} onChange={e=>setTo(e.target.value)} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm focus:outline-none focus:border-amber-500/50">
                    <option value="display">العرض</option><option value="storage">المستودع</option>
                </select></div>
                <div><label className="block text-xs font-medium text-slate-300 mb-1.5">الكمية (الحد الأقصى: {max})</label>
                <input type="number" min="1" max={max} value={qty} onChange={e=>setQty(parseInt(e.target.value)||1)} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm focus:outline-none focus:border-amber-500/50"/></div>
                <div className="flex gap-3 pt-3 border-t border-slate-700/50">
                    <button type="submit" disabled={from===to||qty<1||qty>max} className="flex-1 py-2.5 bg-amber-500 hover:bg-amber-600 disabled:bg-slate-600 disabled:cursor-not-allowed text-slate-900 font-bold rounded-lg transition-colors">نقل</button>
                    <button type="button" onClick={onClose} className="px-5 py-2.5 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-colors">إلغاء</button>
                </div>
            </form>
        </Modal>
    );
}

// ── Sales Tab ─────────────────────────────────────────────────────────────
function SalesTab({sales,setSales,products,setProducts,customers,deleteSale}){
    const [showForm,setShowForm]=useState(false);
    const [editingSale,setEditingSale]=useState(null);
    const [search,setSearch]=useState('');
    const [receipt,setReceipt]=useState(null);

    const filtered=[...sales].filter(s=>{
        const inv=(s.invoiceNumber||'').toLowerCase().includes(search.toLowerCase());
        const cname=customers.find(c=>c.id===s.customerId)?.fullName?.toLowerCase().includes(search.toLowerCase());
        return !search||inv||cname;
    }).sort((a,b)=>new Date(b.date)-new Date(a.date));

    const createSale=data=>{
        let prods=[...products];
        for(const item of data.items){
            const p=prods.find(x=>x.id===item.productId);
            if(!p||(p.quantityInStock||0)<item.quantity){alert(`المخزون غير كافٍ: ${p?.name||''}`);return;}
            prods=prods.map(x=>x.id===item.productId?{...x,quantityInStock:x.quantityInStock-item.quantity,quantityInDisplay:Math.max(0,(x.quantityInDisplay||0)-item.quantity)}:x);
        }
        const inv={id:genId(),invoiceNumber:`INV-${Date.now()}`,date:new Date().toISOString(),...data};
        setProducts(prods);
        setSales(prev=>[...prev,inv]);
        setShowForm(false);
        setReceipt(inv);
    };

    const updateSale=data=>{
        const old=editingSale;
        // Step 1: restore old stock
        let prods=[...products];
        for(const item of (old.items||[])){
            prods=prods.map(x=>x.id===item.productId?{...x,quantityInStock:(x.quantityInStock||0)+item.quantity,quantityInDisplay:(x.quantityInDisplay||0)+item.quantity}:x);
        }
        // Step 2: deduct new stock
        for(const item of data.items){
            const p=prods.find(x=>x.id===item.productId);
            if(!p||(p.quantityInStock||0)<item.quantity){alert(`المخزون غير كافٍ: ${p?.name||''}`);return;}
            prods=prods.map(x=>x.id===item.productId?{...x,quantityInStock:x.quantityInStock-item.quantity,quantityInDisplay:Math.max(0,(x.quantityInDisplay||0)-item.quantity)}:x);
        }
        const updated={...old,...data};
        setProducts(prods);
        setSales(prev=>prev.map(s=>s.id===old.id?updated:s));
        setEditingSale(null);
        setReceipt(updated);
    };

    return (
        <div className="space-y-5">
            <div className="flex flex-col sm:flex-row gap-3 sm:items-center justify-between">
                <div><h2 className="text-xl font-bold text-white">المبيعات والفواتير</h2><p className="text-slate-400 text-sm mt-0.5">إدارة فواتير البيع</p></div>
                <button onClick={()=>setShowForm(true)} className="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-lg flex items-center gap-2 transition-colors self-start sm:self-auto">
                    <IconPlus className="w-4 h-4"/>فاتورة جديدة
                </button>
            </div>
            <div className="relative">
                <IconSearch className="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"/>
                <input type="text" placeholder="بحث برقم الفاتورة أو العميل..." value={search} onChange={e=>setSearch(e.target.value)} className="w-full pr-9 pl-3 py-2 bg-slate-800/60 border border-slate-700/50 rounded-lg text-white placeholder-slate-500 text-sm focus:outline-none focus:border-amber-500/50"/>
            </div>
            <div className="bg-slate-800/50 rounded-xl border border-slate-700/50 overflow-hidden">
                <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                        <thead className="bg-slate-900/60">
                            <tr>{['رقم الفاتورة','التاريخ','العميل','الأصناف','خصم','الإجمالي','الربح',''].map(h=>(
                                <th key={h} className="px-3 py-3 text-right text-xs font-semibold text-slate-400 whitespace-nowrap">{h}</th>
                            ))}</tr>
                        </thead>
                        <tbody className="divide-y divide-slate-700/30">
                            {filtered.map(s=>{
                                const cust=customers.find(c=>c.id===s.customerId);
                                return (
                                    <tr key={s.id} className="hover:bg-slate-900/30 transition-colors">
                                        <td className="px-3 py-3 text-amber-400 font-medium cursor-pointer hover:underline" onClick={()=>setReceipt(s)}>{s.invoiceNumber}</td>
                                        <td className="px-3 py-3 text-slate-300 whitespace-nowrap">{fmtDate(s.date)}</td>
                                        <td className="px-3 py-3 text-white">{cust?.fullName||<span className="text-slate-500 italic text-xs">زبون عابر</span>}</td>
                                        <td className="px-3 py-3 text-slate-300">{(s.items||[]).length} صنف</td>
                                        <td className="px-3 py-3 text-orange-400 whitespace-nowrap">{fmtCurrency(s.discount||0)}</td>
                                        <td className="px-3 py-3 text-emerald-400 font-semibold whitespace-nowrap">{fmtCurrency(s.total)}</td>
                                        <td className="px-3 py-3 whitespace-nowrap"><span className={`font-semibold ${(s.profit||0)>=0?'text-emerald-400':'text-red-400'}`}>{fmtCurrency(s.profit||0)}</span></td>
                                        <td className="px-3 py-3">
                                            <div className="flex gap-1">
                                                <button onClick={()=>setReceipt(s)} className="p-1.5 hover:bg-blue-500/20 text-blue-400 rounded" title="عرض الفاتورة"><IconPrint className="w-4 h-4"/></button>
                                                <button onClick={()=>setEditingSale(s)} className="p-1.5 hover:bg-amber-500/20 text-amber-400 rounded" title="تعديل الفاتورة"><IconEdit className="w-4 h-4"/></button>
                                                <button onClick={()=>deleteSale(s.id)} className="p-1.5 hover:bg-red-500/20 text-red-400 rounded" title="حذف"><IconTrash className="w-4 h-4"/></button>
                                            </div>
                                        </td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                    {filtered.length===0&&<div className="text-center py-12 text-slate-400">لا توجد فواتير</div>}
                </div>
            </div>
            {showForm&&<SaleForm products={products.filter(p=>p.status==='نشط'&&(p.quantityInStock||0)>0)} customers={customers} onSave={createSale} onCancel={()=>setShowForm(false)}/>}
            {editingSale&&<SaleForm
                sale={editingSale}
                products={products.map(p=>{
                    // When editing, add back the old quantities so they appear available
                    const oldItem=(editingSale.items||[]).find(it=>it.productId===p.id);
                    return oldItem?{...p,quantityInStock:(p.quantityInStock||0)+oldItem.quantity}:p;
                }).filter(p=>p.status==='نشط'&&(p.quantityInStock||0)>0)}
                customers={customers}
                onSave={updateSale}
                onCancel={()=>setEditingSale(null)}
            />}
            {receipt&&<ReceiptModal sale={receipt} products={products} customers={customers} onClose={()=>setReceipt(null)}/>}
        </div>
    );
}

// Feature 8: Multi-product sale form (create + edit)
function SaleForm({products,customers,onSave,onCancel,sale}){
    const isEdit=!!sale;
    const [items,setItems]=useState(
        isEdit
            ? (sale.items||[]).map(it=>({productId:it.productId,quantity:String(it.quantity),sellingPrice:String(it.sellingPrice)}))
            : [{productId:'',quantity:'',sellingPrice:''}]
    );
    const [discount,setDiscount]=useState(isEdit?String(sale.discount||''):'');
    const [customerId,setCustId]=useState(isEdit?(sale.customerId||''):'');
    const [notes,setNotes]=useState(isEdit?(sale.notes||''):'');

    const addRow=()=>setItems([...items,{productId:'',quantity:'',sellingPrice:''}]);
    const removeRow=i=>setItems(items.filter((_,idx)=>idx!==i));
    const updateRow=(i,field,val)=>{
        setItems(items.map((row,idx)=>{
            if(idx!==i) return row;
            const up={...row,[field]:val};
            if(field==='productId'){
                const p=products.find(x=>x.id===val);
                up.sellingPrice=p?String(p.currentSellingPrice):'';
            }
            return up;
        }));
    };

    const subtotal=items.reduce((a,r)=>a+(parseFloat(r.quantity)||0)*(parseFloat(r.sellingPrice)||0),0);
    const disc=parseFloat(discount)||0;
    const total=Math.max(0,subtotal-disc);
    const profit=items.reduce((a,r)=>{
        const p=products.find(x=>x.id===r.productId); if(!p) return a;
        return a+((parseFloat(r.sellingPrice)||0)-(p.purchaseCost||0))*(parseFloat(r.quantity)||0);
    },0)-disc;

    const handleSubmit=e=>{
        e.preventDefault();
        const valid=items.filter(r=>r.productId&&(parseFloat(r.quantity)||0)>0);
        if(!valid.length){alert('يرجى إضافة صنف واحد على الأقل');return;}
        onSave({
            items:valid.map(r=>{
                const prod=products.find(p=>p.id===r.productId);
                const unitType=prod?.unitType||'قطعة';
                // For meter/roll units allow decimals, otherwise use integers
                const qty=['متر','لفة'].includes(unitType)?parseFloat(r.quantity):parseInt(r.quantity);
                return {
                    productId:r.productId,
                    productName:prod?.name||'',
                    quantity:qty,
                    unitType,
                    sellingPrice:parseFloat(r.sellingPrice)||0,
                    purchaseCost:prod?.purchaseCost||0,
                };
            }),
            discount:disc,total,profit,customerId,notes
        });
    };

    return (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-3">
            <div className="bg-slate-800 rounded-xl border border-slate-700/50 w-full max-w-3xl max-h-[95vh] flex flex-col">
                <div className="p-5 border-b border-slate-700/50 flex items-center justify-between shrink-0">
                    <h3 className="text-lg font-bold text-white">{isEdit?`تعديل فاتورة ${sale.invoiceNumber}`:'فاتورة مبيعات جديدة'}</h3>
                    <button onClick={onCancel} className="p-1.5 hover:bg-slate-700 rounded text-slate-400"><IconX className="w-5 h-5"/></button>
                </div>
                <form onSubmit={handleSubmit} className="overflow-y-auto flex-1 p-5 space-y-5">
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div><label className="block text-xs font-medium text-slate-300 mb-1.5">العميل</label>
                        <select value={customerId} onChange={e=>setCustId(e.target.value)} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm focus:outline-none focus:border-amber-500/50">
                            <option value="">زبون عابر</option>
                            {customers.map(c=><option key={c.id} value={c.id}>{c.fullName}</option>)}
                        </select></div>

    const update=(id,u)=>{setCustomers(customers.map(c=>c.id===id?{...c,...u}:c));setEditing(null);};

function InstallmentsTab({installments,setInstallments,customers,sales}){
    const [showAdd,setShowAdd]=useState(false);
    const [payModal,setPayModal]=useState(null);
    const [filter,setFilter]=useState('all');

    const filtered=installments.filter(i=>filter==='all'||i.status===filter).sort((a,b)=>new Date(a.nextDueDate)-new Date(b.nextDueDate));

    const add=d=>{setInstallments([...installments,{id:genId(),...d,createdAt:new Date().toISOString()}]);setShowAdd(false);};

    const deleteInstallment=id=>{
        if(!confirm('حذف هذا القسط نهائياً؟'))return;
        setInstallments(installments.filter(i=>i.id!==id));
    };

    const recordPayment=(id,amount)=>{
        setInstallments(installments.map(i=>{
            if(i.id!==id) return i;
            const newBal=Math.max(0,(i.remainingBalance||0)-amount);
            const newStatus=newBal<=0?'مدفوع':i.status;
            let nextDue=i.nextDueDate;
            if(newBal>0){
                const d=new Date(i.nextDueDate);
                if(i.frequency==='أسبوعي')d.setDate(d.getDate()+7);
                else if(i.frequency==='نصف شهري')d.setDate(d.getDate()+14);
                else d.setMonth(d.getMonth()+1);
                nextDue=d.toISOString();
            }
            return{...i,remainingBalance:newBal,status:newStatus,nextDueDate:nextDue};
        }));
        setPayModal(null);
    };

    return (
        <div className="space-y-5">
            <div className="flex flex-col sm:flex-row gap-3 sm:items-center justify-between">
                <div><h2 className="text-xl font-bold text-white">الأقساط</h2><p className="text-slate-400 text-sm mt-0.5">إدارة خطط السداد</p></div>
                <button onClick={()=>setShowAdd(true)} className="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-lg flex items-center gap-2 transition-colors self-start sm:self-auto">
                    <IconPlus className="w-4 h-4"/>خطة جديدة
                </button>
            </div>
            <div className="flex gap-2 flex-wrap">
                {['all','جزئي','مدفوع','متأخر'].map(s=>(
                    <button key={s} onClick={()=>setFilter(s)} className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-colors ${filter===s?'bg-amber-500 text-slate-900':'bg-slate-800/60 text-slate-400 hover:bg-slate-700'}`}>
                        {s==='all'?'الكل':s}
                    </button>
                ))}
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                {filtered.map(inst=>{
                    const cust=customers.find(c=>c.id===inst.customerId);
                    const overdue=inst.status!=='مدفوع'&&new Date(inst.nextDueDate)<new Date();
                    const pct=Math.round(((inst.totalAmount-inst.remainingBalance)/inst.totalAmount)*100)||0;
                    return (
                        <div key={inst.id} className={`bg-slate-800/50 rounded-xl p-5 border transition-colors ${overdue?'border-red-500/50':'border-slate-700/50'}`}>
                            <div className="flex items-start justify-between mb-3">
                                <div><h3 className="text-white font-bold">{cust?.fullName||'غير معروف'}</h3><p className="text-xs text-slate-400 mt-0.5">{inst.invoiceNumber}</p></div>
                                <div className="flex items-center gap-2">
                                    <span className={`px-2.5 py-1 rounded-full text-xs font-bold ${inst.status==='مدفوع'?'bg-emerald-500/20 text-emerald-400':overdue?'bg-red-500/20 text-red-400':'bg-amber-500/20 text-amber-400'}`}>{overdue&&inst.status!=='مدفوع'?'متأخر':inst.status}</span>
                                    <button onClick={()=>deleteInstallment(inst.id)} className="p-1.5 hover:bg-red-500/20 text-red-400 rounded transition-colors" title="حذف القسط"><IconTrash className="w-4 h-4"/></button>
                                </div>
                            </div>
                            {/* Progress bar */}
                            <div className="mb-4">
                                <div className="flex justify-between text-xs text-slate-400 mb-1"><span>نسبة السداد</span><span>{pct}%</span></div>
                                <div className="h-2 bg-slate-700 rounded-full overflow-hidden"><div className="h-full bg-amber-500 rounded-full transition-all" style={{width:`${pct}%`}}></div></div>
                            </div>
                            <div className="grid grid-cols-2 gap-x-4 gap-y-1.5 text-sm mb-4">
                                <div className="text-slate-400">الإجمالي</div><div className="text-white font-medium text-left">{fmtCurrency(inst.totalAmount)}</div>
                                <div className="text-slate-400">المقدم</div><div className="text-emerald-400 text-left">{fmtCurrency(inst.downPayment)}</div>
                                <div className="text-slate-400">المتبقي</div><div className="text-amber-400 font-bold text-left">{fmtCurrency(inst.remainingBalance)}</div>
                                <div className="text-slate-400">القسط</div><div className="text-white text-left">{fmtCurrency(inst.installmentAmount)} / {inst.frequency}</div>
                                {inst.status!=='مدفوع'&&<><div className="text-slate-400">الموعد القادم</div><div className={`font-medium text-left ${overdue?'text-red-400':'text-white'}`}>{fmtDate(inst.nextDueDate)}</div></>}
                            </div>
                            {inst.status!=='مدفوع'&&<button onClick={()=>setPayModal(inst)} className="w-full py-2 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-lg transition-colors text-sm">تسجيل دفعة</button>}
                        </div>
                    );
                })}
                {filtered.length===0&&<div className="col-span-full text-center py-12 text-slate-400">لا توجد أقساط</div>}
            </div>
            {showAdd&&<InstallmentModal customers={customers} sales={sales} onSave={add} onCancel={()=>setShowAdd(false)}/>}
            {payModal&&<PaymentModal installment={payModal} onRecord={recordPayment} onClose={()=>setPayModal(null)}/>}
        </div>
    );
}

function InstallmentModal({customers,sales,onSave,onCancel}){
    const [f,setF]=useState({invoiceNumber:'',customerId:'',totalAmount:'',downPayment:'',installmentAmount:'',frequency:'شهري',nextDueDate:new Date().toISOString().split('T')[0],status:'جزئي'});
    const selSale=sales.find(s=>s.invoiceNumber===f.invoiceNumber);
    useEffect(()=>{if(selSale)setF(p=>({...p,totalAmount:String(selSale.total),customerId:selSale.customerId||p.customerId}));},[selSale?.id]);
    const remaining=Math.max(0,(parseFloat(f.totalAmount)||0)-(parseFloat(f.downPayment)||0));
    const submit=e=>{
        e.preventDefault();
        onSave({...f,totalAmount:parseFloat(f.totalAmount)||0,downPayment:parseFloat(f.downPayment)||0,installmentAmount:parseFloat(f.installmentAmount)||0,remainingBalance:remaining});
    };
    return (
        <Modal title="خطة قسط جديدة" onClose={onCancel} wide>
            <form onSubmit={submit} className="space-y-4">
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div><label className="block text-xs font-medium text-slate-300 mb-1.5">الفاتورة *</label>
                    <select required value={f.invoiceNumber} onChange={e=>setF({...f,invoiceNumber:e.target.value})} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm focus:outline-none focus:border-amber-500/50">
                        <option value="">اختر فاتورة</option>{sales.map(s=><option key={s.id} value={s.invoiceNumber}>{s.invoiceNumber} – {fmtCurrency(s.total)}</option>)}
                    </select></div>
                    <div><label className="block text-xs font-medium text-slate-300 mb-1.5">العميل *</label>
                    <select required value={f.customerId} onChange={e=>setF({...f,customerId:e.target.value})} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm focus:outline-none focus:border-amber-500/50">
                        <option value="">اختر عميل</option>{customers.map(c=><option key={c.id} value={c.id}>{c.fullName}</option>)}
                    </select></div>
                    <div><label className="block text-xs font-medium text-slate-300 mb-1.5">المبلغ الإجمالي *</label><input required type="number" step="0.01" placeholder="أدخل المبلغ" value={f.totalAmount} onChange={e=>setF({...f,totalAmount:e.target.value})} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:border-amber-500/50"/></div>
                    <div><label className="block text-xs font-medium text-slate-300 mb-1.5">المقدم *</label><input required type="number" step="0.01" placeholder="أدخل المبلغ" value={f.downPayment} onChange={e=>setF({...f,downPayment:e.target.value})} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:border-amber-500/50"/></div>
                    <div><label className="block text-xs font-medium text-slate-300 mb-1.5">مبلغ القسط *</label><input required type="number" step="0.01" placeholder="أدخل المبلغ" value={f.installmentAmount} onChange={e=>setF({...f,installmentAmount:e.target.value})} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:border-amber-500/50"/></div>
                    <div><label className="block text-xs font-medium text-slate-300 mb-1.5">الدورية *</label>
                    <select required value={f.frequency} onChange={e=>setF({...f,frequency:e.target.value})} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm focus:outline-none focus:border-amber-500/50">
                        <option value="أسبوعي">أسبوعي</option><option value="نصف شهري">نصف شهري</option><option value="شهري">شهري</option>
                    </select></div>
                    <div className="sm:col-span-2"><label className="block text-xs font-medium text-slate-300 mb-1.5">تاريخ أول قسط</label><input type="date" required value={f.nextDueDate} onChange={e=>setF({...f,nextDueDate:e.target.value})} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm focus:outline-none focus:border-amber-500/50"/></div>
                </div>
                {(parseFloat(f.totalAmount)||0)>0&&(
                    <div className="bg-slate-900/50 rounded-lg p-3 space-y-1.5 text-sm">
                        <div className="flex justify-between"><span className="text-slate-400">الإجمالي</span><span className="text-white">{fmtCurrency(parseFloat(f.totalAmount))}</span></div>
                        <div className="flex justify-between"><span className="text-slate-400">المقدم</span><span className="text-emerald-400">{fmtCurrency(parseFloat(f.downPayment)||0)}</span></div>
                        <div className="flex justify-between border-t border-slate-700 pt-1.5 font-bold"><span className="text-white">المتبقي بالأقساط</span><span className="text-amber-400">{fmtCurrency(remaining)}</span></div>
                    </div>
                )}
                <div className="flex gap-3 pt-3 border-t border-slate-700/50">
                    <button type="submit" className="flex-1 py-2.5 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-lg transition-colors">إنشاء الخطة</button>
                    <button type="button" onClick={onCancel} className="px-5 py-2.5 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-colors">إلغاء</button>
                </div>
            </form>
        </Modal>
    );
}

function PaymentModal({installment,onRecord,onClose}){
    const [amount,setAmount]=useState(String(installment.installmentAmount||''));
    return (
        <Modal title="تسجيل دفعة" onClose={onClose}>
            <div className="bg-slate-900/50 rounded-lg p-4 space-y-1.5 text-sm mb-4">
                <div className="flex justify-between"><span className="text-slate-400">الفاتورة</span><span className="text-white">{installment.invoiceNumber}</span></div>
                <div className="flex justify-between"><span className="text-slate-400">المتبقي</span><span className="text-amber-400 font-bold">{fmtCurrency(installment.remainingBalance)}</span></div>
                <div className="flex justify-between"><span className="text-slate-400">القسط المعتاد</span><span className="text-white">{fmtCurrency(installment.installmentAmount)}</span></div>
            </div>
            <form onSubmit={e=>{e.preventDefault();const a=parseFloat(amount)||0;if(a>0)onRecord(installment.id,a);}} className="space-y-4">
                <div><label className="block text-xs font-medium text-slate-300 mb-1.5">مبلغ الدفعة *</label>
                <input type="number" required step="0.01" min="0.01" max={installment.remainingBalance} value={amount} onChange={e=>setAmount(e.target.value)} className="w-full px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm focus:outline-none focus:border-amber-500/50"/></div>
                {(parseFloat(amount)||0)>0&&(
                    <div className="bg-emerald-500/10 border border-emerald-500/30 rounded-lg p-3 flex justify-between text-sm">
                        <span className="text-emerald-400">الرصيد الجديد</span>
                        <span className="text-emerald-400 font-bold">{fmtCurrency(Math.max(0,(installment.remainingBalance||0)-(parseFloat(amount)||0)))}</span>
                    </div>
                )}
                <div className="flex gap-3 pt-3 border-t border-slate-700/50">
                    <button type="submit" className="flex-1 py-2.5 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-lg transition-colors">تسجيل الدفعة</button>
                    <button type="button" onClick={onClose} className="px-5 py-2.5 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-colors">إلغاء</button>
                </div>
            </form>
        </Modal>
    );
}

// ── Reports Tab ───────────────────────────────────────────────────────────
function ReportsTab({sales,products,installments}){
    const [month,setMonth]=useState(new Date().getMonth());
    const [year,setYear]=useState(new Date().getFullYear());

    const ms=sales.filter(s=>{const d=new Date(s.date);return d.getMonth()===month&&d.getFullYear()===year;});
    const rev=ms.reduce((a,s)=>a+(s.total||0),0);
    const pft=ms.reduce((a,s)=>a+(s.profit||0),0);
    const ai=installments.filter(i=>i.status!=='مدفوع');
    const totalOut=ai.reduce((a,i)=>a+(i.remainingBalance||0),0);
    const overdue=ai.filter(i=>new Date(i.nextDueDate)<new Date());

    const perf=products.map(p=>{
        const ps=sales.flatMap(s=>s.items||[]).filter(it=>it.productId===p.id);
        return{...p,totalSold:ps.reduce((a,it)=>a+(it.quantity||0),0),totalRevenue:ps.reduce((a,it)=>a+(it.quantity||0)*(it.sellingPrice||0),0),totalProfit:ps.reduce((a,it)=>a+((it.sellingPrice||0)-(it.purchaseCost||0))*(it.quantity||0),0)};
    }).sort((a,b)=>b.totalRevenue-a.totalRevenue);

    const months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

    return (
        <div className="space-y-5">
            <div><h2 className="text-xl font-bold text-white">التقارير</h2><p className="text-slate-400 text-sm mt-0.5">تحليلات الأداء</p></div>
            <div className="flex items-center gap-3 bg-slate-800/50 rounded-xl p-4 border border-slate-700/50">
                <IconCal className="w-5 h-5 text-amber-400 shrink-0"/>
                <select value={month} onChange={e=>setMonth(parseInt(e.target.value))} className="px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm focus:outline-none focus:border-amber-500/50">
                    {months.map((m,i)=><option key={m} value={i}>{m}</option>)}
                </select>
                <select value={year} onChange={e=>setYear(parseInt(e.target.value))} className="px-3 py-2 bg-slate-900/50 border border-slate-700/50 rounded-lg text-white text-sm focus:outline-none focus:border-amber-500/50">
                    {[2023,2024,2025,2026].map(y=><option key={y} value={y}>{y}</option>)}
                </select>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div className="bg-gradient-to-br from-emerald-900/40 to-emerald-800/20 rounded-xl p-5 border border-emerald-500/30">
                    <div className="text-sm text-slate-300 mb-1">إيرادات الشهر</div>
                    <div className="text-2xl font-black text-white mb-1">{fmtCurrency(rev)}</div>
                    <div className="text-xs text-emerald-400">{ms.length} فاتورة</div>
                </div>
                <div className="bg-gradient-to-br from-blue-900/40 to-blue-800/20 rounded-xl p-5 border border-blue-500/30">
                    <div className="text-sm text-slate-300 mb-1">أرباح الشهر</div>
                    <div className="text-2xl font-black text-white mb-1">{fmtCurrency(pft)}</div>
                    <div className="text-xs text-blue-400">{((pft/(rev||1))*100).toFixed(1)}% هامش</div>
                </div>
                <div className="bg-gradient-to-br from-amber-900/40 to-amber-800/20 rounded-xl p-5 border border-amber-500/30">
                    <div className="text-sm text-slate-300 mb-1">مستحقات الأقساط</div>
                    <div className="text-2xl font-black text-white mb-1">{fmtCurrency(totalOut)}</div>
                    <div className="text-xs text-amber-400">{ai.length} خطة نشطة · {overdue.length} متأخرة</div>
                </div>
            </div>
            <div className="bg-slate-800/50 rounded-xl p-5 border border-slate-700/50">
                <h3 className="text-base font-semibold text-white mb-4">أداء المنتجات – إجمالي</h3>
                <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                        <thead className="bg-slate-900/60"><tr>{['المنتج','الكمية المباعة','الإيراد','الربح','المخزون المتبقي'].map(h=><th key={h} className="px-3 py-2.5 text-right text-xs font-semibold text-slate-400 whitespace-nowrap">{h}</th>)}</tr></thead>
                        <tbody className="divide-y divide-slate-700/30">
                            {perf.map(p=>(
                                <tr key={p.id} className="hover:bg-slate-900/30">
                                    <td className="px-3 py-3"><div className="font-medium text-white">{p.name}</div><div className="text-xs text-slate-500">{p.category}</div></td>
                                    <td className="px-3 py-3 text-white font-semibold">{p.totalSold}</td>
                                    <td className="px-3 py-3 text-emerald-400 font-semibold whitespace-nowrap">{fmtCurrency(p.totalRevenue)}</td>
                                    <td className="px-3 py-3 text-blue-400 font-semibold whitespace-nowrap">{fmtCurrency(p.totalProfit)}</td>
                                    <td className="px-3 py-3 whitespace-nowrap"><span className={`font-bold ${(p.quantityInStock||0)<=(p.minimumStockAlert||0)?'text-red-400':'text-white'}`}>{p.quantityInStock||0}</span></td>
                                </tr>
                            ))}
                            {perf.length===0&&<tr><td colSpan="5" className="text-center py-8 text-slate-400">لا توجد بيانات</td></tr>}
                        </tbody>
                    </table>
                </div>
            </div>
            {overdue.length>0&&(
                <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-5">
                    <h3 className="text-base font-semibold text-red-400 mb-3 flex items-center gap-2"><IconAlert className="w-5 h-5"/>أقساط متأخرة ({overdue.length})</h3>
                    <div className="space-y-2">{overdue.map(i=>(
                        <div key={i.id} className="flex justify-between items-center text-sm bg-red-500/5 rounded-lg px-3 py-2">
                            <span className="text-slate-300">{i.invoiceNumber}</span>
                            <span className="text-red-400 font-semibold">{fmtCurrency(i.remainingBalance)}</span>
                        </div>
                    ))}</div>
                </div>
            )}
        </div>
    );
}

// ── Shared Modal Component ────────────────────────────────────────────────
function Modal({title,children,onClose,wide=false}){
    return (
        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
            <div className={`bg-slate-800 rounded-xl border border-slate-700/50 w-full max-h-[90vh] flex flex-col ${wide?'max-w-2xl':'max-w-md'}`}>
                <div className="p-5 border-b border-slate-700/50 flex items-center justify-between shrink-0">
                    <h3 className="text-lg font-bold text-white">{title}</h3>
                    <button onClick={onClose} className="p-1.5 hover:bg-slate-700 rounded text-slate-400 transition-colors"><IconX className="w-5 h-5"/></button>
                </div>
                <div className="p-5 overflow-y-auto flex-1">{children}</div>
            </div>
        </div>
    );
}
